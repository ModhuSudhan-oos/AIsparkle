<!-- admin-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Remote Tools Hub</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <div class="login-header">
                <img src="assets/logo.png" alt="Remote Tools Hub" class="login-logo">
                <h2>Admin Portal</h2>
                <p>Sign in to manage your tools and categories</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" class="login-btn">Sign In</button>
                
                <div class="login-message" id="loginMessage"></div>
            </form>
        </div>
        
        <div class="login-footer">
            <p>&copy; 2023 Remote Tools Hub. All rights reserved.</p>
        </div>
    </div>

    <script type="module" src="admin-firebase.js"></script>
</body>
</html>
